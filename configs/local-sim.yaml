# SafeGAI Gateway - Local Simulation Profile
# All adapters are simulators. Cloud is disabled.
# Used for local development and testing without any AWS connectivity.

profile: "local-sim"

gateway:
  id: "gw-local-sim"
  site_id: "site-local"
  tenant_id: "tenant-dev"

adapters:
  camera:
    type: "simulator"
    cameras:
      - id: "CAM-01"
        zones: ["ZONE-01", "ZONE-02"]
      - id: "CAM-02"
        zones: ["ZONE-03", "ZONE-04"]
      - id: "CAM-03"
        zones: ["ZONE-05", "ZONE-06"]
      - id: "CAM-04"
        zones: ["ZONE-07", "ZONE-08"]

  sensor:
    type: "simulator"
    sensors:
      - id: "SENSOR-TEMP-01"
        sensor_type: "temperature"
      - id: "SENSOR-HUM-01"
        sensor_type: "humidity"

  equipment:
    type: "simulator"
    poll_interval: "1s"

  output:
    type: "simulator"
    supported_commands:
      - "WARNING_LIGHT"
      - "WARNING_SIREN"
      - "VOICE_ANNOUNCE"
      - "STOP_REQUEST"
      - "DIGITAL_OUTPUT_TEST"

  media:
    type: "simulator"
    streams: 4

  cloud:
    type: "disabled"

  notification:
    type: "log"

storage:
  path: "/var/lib/safegai/data/safegai.db"

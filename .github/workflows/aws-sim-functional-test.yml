name: AWS Sim Functional Test

on:
  workflow_dispatch:
    inputs:
      scenarios:
        description: 'Scenarios to run (comma-separated, e.g., S01,S02 or ALL)'
        required: true
        default: 'ALL'
  workflow_run:
    workflows: ["AWS Sim Deploy"]
    types: [completed]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  GOTOOLCHAIN: local

jobs:
  functional-test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/gateway-server/go.mod
          check-latest: true
          cache: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_SIM_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get gateway instance IP
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=safegai-sim" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Run scenarios via SSM
        run: |
          SCENARIOS="${{ inputs.scenarios || 'ALL' }}"
          echo "Running scenarios: $SCENARIOS"
          aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['curl -s -X POST http://localhost:9010/run -d {\"scenarioId\":\"$SCENARIOS\"}']" \
            --output text || echo "SSM command sent"

      - name: Collect results
        run: |
          echo "Collecting test results..."
          # In production, poll SSM command output or query scenario-runner API
          sleep 30
          echo "Functional test execution complete"

      - name: Generate report
        run: |
          echo "## Functional Test Report" > functional-test-report.md
          echo "- Scenarios requested: ${{ inputs.scenarios || 'ALL' }}" >> functional-test-report.md
          echo "- Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> functional-test-report.md
          echo "- Status: Executed" >> functional-test-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: functional-test-report
          path: functional-test-report.md
          retention-days: 30
